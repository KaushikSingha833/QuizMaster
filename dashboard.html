<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Dashboard - QuizMaster</title>
    <link rel="stylesheet" href="style.css">
    <script>if (!localStorage.getItem('currentUser')) window.location.replace('auth.html');</script>
</head>
<body>
    <nav id="navbar" class="navbar"></nav>
    <div class="container">
        <a href="index.html" class="back-nav">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <span>Back to Home</span>
        </a>
        <h2>My Quiz Responses</h2>
        <p style="text-align: center; margin-bottom: 20px; color: #64748b;">Select a quiz to view participant performance and manage your links.</p>
        
        <select id="quiz-filter" class="auth-input full-width" onchange="window.filterResponses()" style="display: none; cursor: pointer;">
            <option value="">-- Select a Quiz --</option>
        </select>

        <div id="quiz-link-container" style="display: none; margin-bottom: 25px; padding: 20px; background: #eff6ff; border-radius: 12px; border: 1px solid #bfdbfe; text-align: center;">
            <p style="margin-bottom: 12px; font-weight: 600; color: #1e40af;">Shareable Quiz Link:</p>
            <input type="text" id="shareable-link-input" readonly class="auth-input" style="background: #ffffff; text-align: center; margin-bottom: 15px;">
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button class="btn primary-btn" onclick="window.copyDashboardLink()" id="dash-copy-btn">Copy Link</button>
                <button class="btn" style="background-color: #ef4444; color: white;" onclick="window.deleteQuizAction()">Delete Quiz</button>
            </div>
        </div>
        
        <div id="responses-list" class="list-container"></div>
    </div>
    <script type="module" src="quiz-logic.js"></script>
</body>
</html>
